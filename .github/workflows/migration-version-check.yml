name: Migration Version Check

on:
  pull_request:
    paths:
      - 'migrations/**'
      - 'src/db/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/migration-check.yml'
  push:
    branches: [main, master, mitchwork]

jobs:
  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: titanbot
          POSTGRES_PASSWORD: titanbot
          POSTGRES_DB: titanbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U titanbot -d titanbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_URL: postgresql://titanbot:titanbot@localhost:5432/titanbot
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: titanbot
      POSTGRES_USER: titanbot
      POSTGRES_PASSWORD: titanbot
      POSTGRES_SSL: "false"
      SCHEMA_VERSION: "1"
      SCHEMA_VERSION_LABEL: "baseline-v1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U titanbot && exit 0
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Apply migrations
        run: npm run migrate

      - name: Validate migration version
        run: npm run migrate:check

      - name: Dump schema on failure
        if: failure()
        run: |
          echo "::group::Current Database Schema"
          psql "$POSTGRES_URL" -c "\dt" || true
          echo "::endgroup::"
